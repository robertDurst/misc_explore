name: Sync squad

on:
  schedule:
    - cron: "0 */12 * * *"  # every 12 hours
  workflow_dispatch:        # manual run from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Sync squad (write mode)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        # Exit 1 from the script means "drift detected" — that's expected, not a failure.
        run: npx tsx scripts/sync-squad.ts --write || [ $? -eq 1 ]

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/sync-squad
          commit-message: "sync-squad: refresh shirt numbers from API-Football"
          title: "sync-squad: refresh shirt numbers from API-Football"
          body: |
            Auto-generated by `.github/workflows/sync-squad.yml`.

            This PR contains only **shirt number** updates — the one field
            safe to auto-sync. Check the workflow run log for the full report,
            which also flags:
            - `MANUAL` drifts (DOB, etc.) for human review
            - New players in API but not repo (mix of signings and Primavera —
              create the `.md` files manually for the ones that matter)
            - Cedidos that didn't show up in the squad endpoint (verify the
              loan is still active)
          delete-branch: true
