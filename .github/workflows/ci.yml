name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Type check + content schema
        run: npm run check
      - name: Unit tests
        run: npm run test
      - name: Build (Astro)
        run: npx astro build
