<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Café Azzurro 1926</title>
  <meta name="description" content="El Napoli, contado en español. Próximamente.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    :root{
      --cream:#F3E9D8; --navy:#003C82; --azzurro:#12A0D7; --gold:#C68A3E;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0; background:var(--cream); color:var(--navy);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display:flex; flex-direction:column; min-height:100vh; text-align:center;
    }
    main{
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:14px; padding:32px;
    }
    .logo{ width:170px; height:170px; }
    h1{
      font-family:'Fraunces', Georgia, serif; font-weight:700;
      font-size:clamp(44px, 9vw, 86px); line-height:1; margin:8px 0 0; letter-spacing:.5px;
    }
    h1 .az{ color:var(--azzurro); }
    .rule{ width:min(360px, 72%); height:2px; background:var(--gold); border:0; margin:8px 0 2px; }
    .tag{
      font-family:'Fraunces', Georgia, serif; font-style:italic;
      font-size:clamp(18px, 3.6vw, 25px); margin:0;
    }
    .soon{
      margin:16px 0 0; font-size:13px; font-weight:600; color:var(--gold);
      letter-spacing:5px; text-transform:uppercase;
    }
    footer{ padding:18px; font-size:11px; letter-spacing:1px; color:#8a7a63; }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="logo.svg" alt="Café Azzurro 1926">
    <h1>Café <span class="az">Azzurro</span></h1>
    <hr class="rule">
    <p class="tag">El Napoli sabe mejor en español.</p>
    <p class="soon">Próximamente · 1926</p>
  </main>
  <footer>Proyecto de aficionados · sin afiliación oficial con la SSC Napoli</footer>
</body>
</html>
